<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solapur Tourism</title>
<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
/* --- Global Styles --- */
body {
    font-family: 'Poppins', sans-serif;
    margin: 0;
    padding: 0;
    color: #fff;
    overflow-x: hidden;
    background-color: #111;
}

/* --- Header & Navigation (Glassmorphism) --- */
header {
    text-align: center;
    padding: 25px 20px;
    background: rgba(0, 0, 0, 0.4);
    backdrop-filter: blur(10px);
    position: fixed;
    width: 100%;
    top: 0;
    z-index: 100;
    box-sizing: border-box;
    animation: slideDown 1s ease-out forwards;
}

@keyframes slideDown {
    from { transform: translateY(-100%); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
}

h1 {
    color: #fff;
    margin: 0 0 15px 0;
    font-size: 28px;
    letter-spacing: 1px;
    text-transform: uppercase;
}

nav {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 25px;
}

nav a {
    text-decoration: none;
    color: #ddd;
    font-weight: 400;
    font-size: 16px;
    position: relative;
    padding-bottom: 5px;
    transition: color 0.3s;
    text-transform: uppercase;
    letter-spacing: 1px;
}

nav a::after {
    content: '';
    position: absolute;
    width: 0;
    height: 2px;
    bottom: 0;
    left: 0;
    background-color: #e74c3c;
    transition: width 0.3s ease;
}

nav a:hover {
    color: #fff;
}

nav a:hover::after {
    width: 100%;
}

/* --- Cinematic Hero Section --- */
.hero {
    position: relative;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    overflow: hidden;
    padding: 0 20px;
}

/* Background image with slow zoom (Ken Burns effect) */
.hero::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    /* REPLACE 'solapur-bg.jpg' WITH YOUR OWN EDITED PHOTO */
    background: url('gallery/solapur-bg.jpg') no-repeat center center/cover;
    animation: zoomInOut 20s infinite alternate linear;
    z-index: -2;
}

@keyframes zoomInOut {
    0% { transform: scale(1); }
    100% { transform: scale(1.15); }
}

/* Dark gradient overlay so the white text is readable */
.hero::after {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(to bottom, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.8) 100%);
    z-index: -1;
}

/* --- Hero Content Animations --- */
.hero h2 {
    font-size: 55px;
    font-weight: 800;
    margin: 0 0 20px 0;
    text-shadow: 2px 4px 10px rgba(0,0,0,0.5);
    opacity: 0;
    animation: fadeUp 1s cubic-bezier(0.2, 0.8, 0.2, 1) 0.5s forwards;
}

.hero p {
    font-size: 22px;
    font-weight: 300;
    margin: 0 0 40px 0;
    max-width: 600px;
    text-shadow: 1px 2px 5px rgba(0,0,0,0.5);
    opacity: 0;
    animation: fadeUp 1s cubic-bezier(0.2, 0.8, 0.2, 1) 0.8s forwards;
}

/* Call to Action Button */
.cta-button {
    text-decoration: none;
    color: #fff;
    background-color: #e74c3c;
    padding: 15px 35px;
    font-size: 18px;
    font-weight: 600;
    border-radius: 30px;
    box-shadow: 0 4px 15px rgba(231, 76, 60, 0.4);
    transition: all 0.3s ease;
    opacity: 0;
    animation: fadeUp 1s cubic-bezier(0.2, 0.8, 0.2, 1) 1.1s forwards, pulse 2s infinite 2.5s;
}

.cta-button:hover {
    background-color: #c0392b;
    transform: translateY(-3px) scale(1.05);
    box-shadow: 0 8px 25px rgba(231, 76, 60, 0.6);
}

@keyframes fadeUp {
    from { opacity: 0; transform: translateY(40px); }
    to { opacity: 1; transform: translateY(0); }
}

@keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.5); }
    70% { box-shadow: 0 0 0 15px rgba(231, 76, 60, 0); }
    100% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0); }
}

/* --- Footer --- */
footer {
    position: absolute;
    bottom: 20px;
    width: 100%;
    text-align: center;
    font-size: 14px;
    color: rgba(255, 255, 255, 0.6);
    opacity: 0;
    animation: fadeUp 1s ease 1.5s forwards;
}
</style>
</head>

<body>

<header>
    <h1>Solapur Tourism</h1>
    <nav>
        <a href="home.html">Home</a>
        <a href="places.html">Places</a>
        <a href="culture.html">Culture</a>
        <a href="travel-guide.html">Travel Guide</a>
        <a href="food.html">Food</a>
        <a href="enquiry.html">Enquiry</a>
    </nav>
</header>

<section class="hero">
    <h2>Discover the Spiritual City</h2>
    <p>Explore centuries of temples, vibrant culture, authentic food, and comprehensive travel information.</p>
    <a href="places.html" class="cta-button">Start Exploring</a>
</section>

<footer>
    &copy; 2026 Solapur Tourism
</footer>

</body>
</html>
