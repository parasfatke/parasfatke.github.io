<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery - Solapur Tourism</title>
<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
/* --- Global Styles (Matching Theme) --- */
body {
    font-family: 'Poppins', sans-serif;
    margin: 0;
    padding: 0;
    color: #333;
    background-color: #f4f7f6; /* Soft, clean background */
    overflow-x: hidden;
}

/* --- Header & Navigation (Sticky & Glassmorphism) --- */
header {
    text-align: center;
    padding: 25px 20px;
    background: rgba(255, 255, 255, 0.85);
    backdrop-filter: blur(12px); 
    box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    position: sticky;
    top: 0;
    z-index: 100;
    animation: slideDown 0.8s ease-out forwards;
}

@keyframes slideDown {
    from { transform: translateY(-100%); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
}

header h1 {
    color: #2c3e50;
    margin: 0 0 15px 0;
    font-size: 32px;
}

nav {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 20px;
}

nav a {
    text-decoration: none;
    color: #555;
    font-weight: 600;
    position: relative;
    padding-bottom: 5px;
    transition: color 0.3s;
}

nav a::after {
    content: '';
    position: absolute;
    width: 0;
    height: 2px;
    bottom: 0;
    left: 0;
    background-color: #e74c3c;
    transition: width 0.3s ease;
}

nav a:hover {
    color: #e74c3c;
}

nav a:hover::after {
    width: 100%;
}

/* --- Container & Section Cards (Matching Theme) --- */
.container {
    max-width: 1000px;
    margin: 40px auto;
    padding: 0 20px;
}

section {
    background: #ffffff;
    border-radius: 15px;
    padding: 40px;
    margin-bottom: 40px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    border-left: 5px solid #e74c3c; /* Signature red border */
    
    /* Starting state for JS scroll reveal */
    opacity: 0;
    transform: translateY(50px);
    transition: opacity 0.6s ease-out, transform 0.6s ease-out;
}

/* Class added by JS when scrolled into view */
section.visible {
    opacity: 1;
    transform: translateY(0);
}

h2 {
    color: #2c3e50;
    font-size: 28px;
    margin-top: 0;
    margin-bottom: 25px;
    border-bottom: 2px solid #f0f0f0;
    padding-bottom: 10px;
    text-align: center;
}

/* --- Upgraded Main Gallery --- */
.gallery {
    display: flex;
    flex-wrap: wrap;
    gap: 25px;
    justify-content: center;
}

.gallery img {
    width: 100%;
    max-width: 280px;
    height: 220px;
    object-fit: cover;
    border-radius: 12px;
    box-shadow: 0 6px 15px rgba(0,0,0,0.1);
    transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s ease;
    cursor: pointer;
}

.gallery img:hover {
    transform: scale(1.05) translateY(-5px);
    box-shadow: 0 15px 25px rgba(0,0,0,0.2);
    z-index: 10;
}

/* --- Footer --- */
footer {
    text-align: center;
    padding: 20px;
    background-color: #2c3e50;
    color: white;
    margin-top: 40px;
}

/* Mobile Responsiveness */
@media (max-width: 768px) {
    section {
        padding: 25px;
    }
    .gallery img {
        max-width: 100%;
        height: 250px;
    }
}
</style>

</head>

<body>

<header>
    <h1>Solapur Tourism Gallery</h1>
    <nav>
        <a href="home.html">Home</a>
        <a href="places.html">Places</a>
        <a href="culture.html">Culture</a>
        <a href="travel-guide.html">Travel Guide</a>
        <a href="food.html">Food</a>
        <a href="gallery.html">Gallery</a>
        <a href="enquiry.html">Enquiry</a>
    </nav>
</header>

<div class="container">
    <section class="reveal">
        <h2>Explore Photos of Solapur</h2>

        <div class="gallery">
            <img src="images/siddeshwar.jpg" alt="Siddheshwar Temple">
            <img src="images/siddeshwar_night.jpg" alt="Siddheshwar Temple Night">
            <img src="images/pandharpur1.jpg" alt="Pandharpur Temple">
            <img src="images/pandharpur2.jpg" alt="Pandharpur Vitthal Temple">
            <img src="images/tuljapur1.jpg" alt="Tuljapur Temple">
            <img src="images/tuljapur2.jpg" alt="Tulja Bhavani Temple">
            <img src="images/tuljapur3.jpg" alt="Tuljapur Temple View">
        </div>
    </section>
</div>

<footer>
    <p>&copy; 2026 Solapur Tourism</p>
</footer>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                    observer.unobserve(entry.target); 
                }
            });
        }, { threshold: 0.15 });

        const hiddenElements = document.querySelectorAll('.reveal');
        hiddenElements.forEach((el) => observer.observe(el));
    });
</script>

</body>
</html>
