<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery - Solapur Premium</title>
<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
/* --- Global Styles: Premium Dark Mode --- */
body {
    font-family: 'Poppins', sans-serif;
    margin: 0;
    padding: 0;
    color: #e2e8f0;
    background-color: #0b1120; 
    background-image: radial-gradient(circle at top center, #1e293b 0%, #0b1120 100%);
    background-attachment: fixed;
    overflow-x: hidden;
}

/* --- Header & Navigation (Dark Glassmorphism) --- */
header {
    text-align: center;
    padding: 25px 20px;
    background: rgba(11, 17, 32, 0.7);
    backdrop-filter: blur(15px); 
    border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    position: sticky;
    top: 0;
    z-index: 100;
    animation: slideDown 0.8s ease-out forwards;
}

@keyframes slideDown {
    from { transform: translateY(-100%); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
}

header h1 {
    color: #f8fafc;
    margin: 0 0 15px 0;
    font-size: 32px;
    letter-spacing: 1px;
}

nav {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 25px;
}

nav a {
    text-decoration: none;
    color: #94a3b8;
    font-weight: 500;
    font-size: 15px;
    position: relative;
    padding-bottom: 5px;
    transition: color 0.3s;
    text-transform: uppercase;
    letter-spacing: 1px;
}

nav a::after {
    content: '';
    position: absolute;
    width: 0;
    height: 2px;
    bottom: 0;
    left: 0;
    background-color: #f5a623;
    transition: width 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
}

nav a:hover, nav a:focus {
    color: #f5a623;
}

nav a:hover::after {
    width: 100%;
}

/* --- Container & Gallery Section (Premium Dark) --- */
.container {
    max-width: 1100px; /* Wider for gallery */
    margin: 60px auto;
    padding: 0 20px;
}

section {
    background: rgba(30, 41, 59, 0.6);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 20px;
    padding: 50px;
    margin-bottom: 40px;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    
    opacity: 0;
    transform: translateY(40px);
    transition: opacity 0.7s ease-out, transform 0.7s ease-out;
}

section.visible {
    opacity: 1;
    transform: translateY(0);
}

h2 {
    color: #f5a623;
    font-size: 32px;
    margin-top: 0;
    margin-bottom: 35px;
    text-align: center;
    font-weight: 600;
    border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    padding-bottom: 20px;
}

/* --- Main Dark Gallery --- */
.gallery {
    display: flex;
    flex-wrap: wrap;
    gap: 30px;
    justify-content: center;
}

.gallery img {
    width: 100%;
    max-width: 280px;
    height: 220px;
    object-fit: cover;
    border-radius: 12px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    box-shadow: 0 10px 20px rgba(0,0,0,0.4);
    transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s ease, border-color 0.4s ease;
    cursor: pointer;
}

.gallery img:hover {
    transform: scale(1.05) translateY(-5px);
    box-shadow: 0 25px 40px rgba(0,0,0,0.7);
    border-color: rgba(245, 166, 35, 0.5); /* Amber glow frame */
    z-index: 10;
}

/* --- Footer --- */
footer {
    text-align: center;
    padding: 25px;
    background-color: #020617;
    border-top: 1px solid rgba(255, 255, 255, 0.05);
    color: #64748b;
    margin-top: 60px;
    font-size: 14px;
}

/* Mobile Responsiveness */
@media (max-width: 768px) {
    section {
        padding: 30px 20px;
    }
    .gallery img {
        max-width: 100%;
        height: 250px;
    }
}
</style>

</head>

<body>

<header>
    <h1>Solapur Gallery</h1>
    <nav>
        <a href="home.html">Home</a>
        <a href="places.html">Places</a>
        <a href="culture.html">Culture</a>
        <a href="travel-guide.html">Travel Guide</a>
        <a href="food.html">Food</a>
        <a href="gallery.html">Gallery</a>
        <a href="enquiry.html">Enquiry</a>
    </nav>
</header>

<div class="container">
    <section class="reveal">
        <h2>Explore Our City</h2>

        <div class="gallery">
            <img src="images/siddeshwar.jpg" alt="Siddheshwar Temple">
            <img src="images/siddeshwar_night.jpg" alt="Siddheshwar Temple Night">
            <img src="images/pandharpur1.jpg" alt="Pandharpur Temple">
            <img src="images/pandharpur2.jpg" alt="Pandharpur Vitthal Temple">
            <img src="images/tuljapur1.jpg" alt="Tuljapur Temple">
            <img src="images/tuljapur2.jpg" alt="Tulja Bhavani Temple">
            <img src="images/tuljapur3.jpg" alt="Tuljapur Temple View">
        </div>
    </section>
</div>

<footer>
    <p>&copy; 2026 Solapur Tourism</p>
</footer>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                    observer.unobserve(entry.target); 
                }
            });
        }, { threshold: 0.15 });

        const hiddenElements = document.querySelectorAll('.reveal');
        hiddenElements.forEach((el) => observer.observe(el));
    });
</script>

</body>
</html>
