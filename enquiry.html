<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tourist Enquiry - Solapur Premium</title>
<link rel="stylesheet" href="style.css">
<script src="script.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
/* --- Global Styles: Premium Dark Mode --- */
body {
    font-family: 'Poppins', sans-serif;
    margin: 0;
    padding: 0;
    color: #e2e8f0;
    /* Deep midnight slate background */
    background-color: #0b1120; 
    /* Subtle radial gradient to draw the eye to the center */
    background-image: radial-gradient(circle at top center, #1e293b 0%, #0b1120 100%);
    background-attachment: fixed;
    overflow-x: hidden;
}

/* --- Header & Navigation (Dark Glassmorphism) --- */
header {
    text-align: center;
    padding: 25px 20px;
    background: rgba(11, 17, 32, 0.7);
    backdrop-filter: blur(15px); 
    border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    position: sticky;
    top: 0;
    z-index: 100;
    animation: slideDown 0.8s ease-out forwards;
}

@keyframes slideDown {
    from { transform: translateY(-100%); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
}

header h1 {
    color: #f8fafc;
    margin: 0 0 15px 0;
    font-size: 32px;
    letter-spacing: 1px;
}

nav {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 25px;
}

nav a {
    text-decoration: none;
    color: #94a3b8;
    font-weight: 500;
    font-size: 15px;
    position: relative;
    padding-bottom: 5px;
    transition: color 0.3s;
    text-transform: uppercase;
    letter-spacing: 1px;
}

/* Premium Amber Underline */
nav a::after {
    content: '';
    position: absolute;
    width: 0;
    height: 2px;
    bottom: 0;
    left: 0;
    background-color: #f5a623;
    transition: width 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
}

nav a:hover, nav a:focus {
    color: #f5a623;
}

nav a:hover::after {
    width: 100%;
}

/* --- Container & Floating Form Card --- */
.container {
    max-width: 750px; 
    margin: 60px auto;
    padding: 0 20px;
}

section {
    background: rgba(30, 41, 59, 0.6);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 20px;
    padding: 50px;
    margin-bottom: 40px;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    
    /* Starting state for JS scroll reveal */
    opacity: 0;
    transform: translateY(30px);
    transition: opacity 0.7s ease-out, transform 0.7s ease-out;
}

section.visible {
    opacity: 1;
    transform: translateY(0);
}

h2 {
    color: #f5a623; /* Amber accent */
    font-size: 32px;
    margin-top: 0;
    margin-bottom: 10px;
    text-align: center;
    font-weight: 600;
}

.subtitle {
    text-align: center;
    color: #94a3b8;
    margin-bottom: 40px;
    font-size: 15px;
}

/* --- Form Specific Styles --- */
form {
    display: flex;
    flex-direction: column;
    gap: 24px;
}

.input-group {
    display: flex;
    flex-direction: column;
    text-align: left;
    position: relative;
}

label {
    font-weight: 500;
    color: #cbd5e1;
    font-size: 14px;
    margin-bottom: 8px;
    letter-spacing: 0.5px;
}

/* Custom High-End Inputs */
input[type="text"],
input[type="number"],
input[type="date"],
textarea {
    width: 100%;
    padding: 16px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 10px;
    font-family: 'Poppins', sans-serif;
    font-size: 15px;
    background-color: rgba(15, 23, 42, 0.8);
    color: #f8fafc;
    transition: all 0.3s ease;
    box-sizing: border-box; 
}

/* Custom placeholder color */
::placeholder {
    color: #64748b;
}

/* Dark mode calendar icon fix */
input[type="date"]::-webkit-calendar-picker-indicator {
    filter: invert(1);
    opacity: 0.6;
    cursor: pointer;
}

/* Input Hover & Focus */
input:hover, textarea:hover {
    border-color: rgba(245, 166, 35, 0.4);
}

input:focus, textarea:focus {
    outline: none;
    border-color: #f5a623;
    background-color: rgba(15, 23, 42, 1);
    box-shadow: 0 0 0 4px rgba(245, 166, 35, 0.1); 
}

textarea {
    resize: vertical;
    min-height: 140px;
}

/* --- Premium Submit Button --- */
button[type="submit"] {
    background: linear-gradient(135deg, #f5a623 0%, #d97706 100%);
    color: #0f172a;
    padding: 18px;
    border: none;
    border-radius: 10px;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    margin-top: 15px;
    text-transform: uppercase;
}

button[type="submit"]:hover {
    transform: translateY(-4px);
    box-shadow: 0 15px 30px -5px rgba(245, 166, 35, 0.4);
}

button[type="submit"]:active {
    transform: translateY(0);
}

/* --- Footer --- */
footer {
    text-align: center;
    padding: 25px;
    background-color: #020617;
    border-top: 1px solid rgba(255, 255, 255, 0.05);
    color: #64748b;
    margin-top: 60px;
    font-size: 14px;
}

/* Mobile Responsiveness */
@media (max-width: 768px) {
    section {
        padding: 30px 20px;
    }
}
</style>

</head>

<body>

<header>
    <h1>Solapur Tourism</h1>
    <nav>
        <a href="home.html">Home</a>
        <a href="places.html">Places</a>
        <a href="culture.html">Culture</a>
        <a href="travel-guide.html">Travel Guide</a>
        <a href="food.html">Food</a>
        <a href="gallery.html">Gallery</a>
        <a href="enquiry.html">Enquiry</a>
    </nav>
</header>

<div class="container">
    <section class="reveal">
        <h2>Plan Your Visit</h2>
        <p class="subtitle">Reach out to us to begin your journey through Solapur.</p>
        
        <form onsubmit="return validateForm()">
            
            <div class="input-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" placeholder="Enter your full name" required>
            </div>

            <div class="input-group">
                <label for="email">Email Address</label>
                <input type="text" id="email" placeholder="Enter your email" required>
            </div>

            <div class="input-group">
                <label for="phone">Phone Number</label>
                <input type="text" id="phone" placeholder="Enter your phone number">
            </div>

            <div class="input-group">
                <label for="country">Country</label>
                <input type="text" id="country" placeholder="Where are you visiting from?">
            </div>

            <div class="input-group">
                <label for="travelers">Number of Travelers</label>
                <input type="number" id="travelers" placeholder="e.g. 2" min="1">
            </div>

            <div class="input-group">
                <label for="date">Planned Travel Date</label>
                <input type="date" id="date">
            </div>

            <div class="input-group">
                <label for="message">Message / Special Requests</label>
                <textarea id="message" placeholder="How can we help you plan your trip?"></textarea>
            </div>

            <button type="submit">Submit Enquiry</button>

        </form>
    </section>
</div>

<footer>
    <p>&copy; 2026 Solapur Tourism</p>
</footer>

<script>
    // Smooth scroll reveal animation
    document.addEventListener("DOMContentLoaded", function() {
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                    observer.unobserve(entry.target); 
                }
            });
        }, { threshold: 0.15 });

        const hiddenElements = document.querySelectorAll('.reveal');
        hiddenElements.forEach((el) => observer.observe(el));
    });
</script>

</body>
</html>
